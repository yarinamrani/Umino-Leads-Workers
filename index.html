<!doctype html>

<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>אומינו — לידים</title>
<style>
  :root{
    --bg:#0e1116; --panel:#171b22; --panel2:#1f242d; --line:#2a313c;
    --text:#e7ecf3; --muted:#8b95a4; --accent:#4f7cff;
    --new:#3ea372; --sched:#d39a2e; --prog:#4f7cff; --hide:#7a8294;
    --bad:#d05757;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:-apple-system,system-ui,"Segoe UI","Heebo",sans-serif;}
  header{padding:14px 18px;background:var(--panel);border-bottom:1px solid var(--line);
    display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  header h1{margin:0;font-size:18px;font-weight:600;letter-spacing:.2px}
  header .badge{font-size:11px;background:#2a3042;color:#9ab0ff;
    padding:3px 8px;border-radius:999px}
  header .right{margin-inline-start:auto;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  select,button,input{background:var(--panel2);color:var(--text);border:1px solid var(--line);
    border-radius:8px;padding:8px 10px;font-size:13px}
  button{cursor:pointer}
  button:hover{border-color:#3a4252}
  .stat{font-size:12px;color:var(--muted)}
  main{padding:14px 18px;display:flex;flex-direction:column;gap:18px}
  .section{background:var(--panel);border:1px solid var(--line);border-radius:12px;overflow:hidden}
  .sec-head{padding:10px 14px;border-bottom:1px solid var(--line);display:flex;
    align-items:center;gap:10px;font-weight:600}
  .sec-head .count{background:var(--panel2);padding:2px 8px;border-radius:999px;font-size:12px;color:var(--muted);font-weight:500}
  .sec-head .dot{width:8px;height:8px;border-radius:50%}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));
    gap:10px;padding:12px}
  .card{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:12px;display:flex;flex-direction:column;gap:8px}
  .card .name{font-weight:600;font-size:15px}
  .row{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
  .pill{font-size:11px;padding:2px 8px;border-radius:999px;background:#262d39;color:var(--muted)}
  .pill.role{background:#2c3a5a;color:#a8baf5}
  .pill.time{background:#23282f}
  .actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px}
  .actions a, .actions button{font-size:12px;padding:6px 10px;border-radius:8px;text-decoration:none;
    border:1px solid var(--line);background:var(--panel);color:var(--text);cursor:pointer}
  .actions a.wa{background:#1f3d2e;border-color:#28543f;color:#7ddca7}
  .actions a.call{background:#1d2c44;border-color:#2a4368;color:#9bb6ec}
  .actions button.hide{background:#2c2222;border-color:#553030;color:#e3a3a3}
  .controls{display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .controls select{font-size:12px;padding:6px 8px}
  .empty{padding:18px 14px;color:var(--muted);font-size:13px;text-align:center}
  .err{background:#3a1f1f;border:1px solid #6c2929;color:#ffb3b3;padding:10px 14px;border-radius:8px;font-size:13px;margin:14px 18px}
  .interview-row{display:flex;gap:6px;align-items:center}
  .interview-row input{padding:6px 8px;font-size:12px;flex:1;min-width:0}
  .saving{font-size:11px;color:var(--muted)}
  .saving.ok{color:#7ddca7}
  .saving.bad{color:#e3a3a3}
  .loading{padding:24px;text-align:center;color:var(--muted)}
</style>
</head>
<body>
<header>
  <h1>אומינו — לידים</h1>
  <span class="badge">UMINO</span>
  <div class="right">
    <span class="stat" id="stat">טוען…</span>
    <select id="roleFilter" title="תפקיד">
      <option value="">כל התפקידים</option>
    </select>
    <button id="refreshBtn">רענן</button>
  </div>
</header>

<div id="errBox"></div>
<main id="app"><div class="loading">טוען לידים…</div></main>

<script>
/* ============== CONFIG — UMINO ONLY ============== */
const CFG = {
  business: 'umino',
  sheetId: '1NCl4qxe8gYKXA08cNxHoCyWvHyWXOUMUbffTUsFZVdo',
  supabase: {
    url: 'https://vzeowbriddhvhpishmhn.supabase.co',
    anonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ6ZW93YnJpZGRodmhwaXNobWhuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MTAyNDUsImV4cCI6MjA4ODM4NjI0NX0.PWvjFj41l0wB9awroZdDsMhCJ0yJXdrf1-k-45n0Rwk',
    table: 'lead_statuses_umino'  // SEPARATE FROM PASEO
  },
  handlers: ['גיל', 'בר'],
  // Unified status list — each status maps to a dashboard bucket
  statuses: [
    { v:'new',           label:'— (חדש)',        bucket:'new' },
    { v:'message_sent',  label:'נשלחה הודעה',     bucket:'new' },
    { v:'no_answer',     label:'אין מענה',        bucket:'new' },
    { v:'scheduled',     label:'נקבע ראיון',      bucket:'scheduled' },
    { v:'confirmed',     label:'אושר',            bucket:'scheduled' },
    { v:'cancelled',     label:'בוטל',            bucket:'scheduled' },
    { v:'in_progress',   label:'בתהליך',          bucket:'in_progress' },
    { v:'follow_up',     label:'מעקב',            bucket:'in_progress' },
    { v:'not_relevant',  label:'לא רלוונטי',      bucket:'not_relevant' }
  ]
};

/* ============== STATE ============== */
let LEADS = [];        // raw merged leads
let STATUSES = {};     // lead_key -> supabase row
let ROLE_FILTER = '';

/* ============== HELPERS ============== */
const $ = sel => document.querySelector(sel);
const showErr = msg => {
  const box = $('#errBox');
  box.innerHTML = `<div class="err">⚠ ${msg}</div>`;
};
const clearErr = () => { $('#errBox').innerHTML = ''; };

function relativeHe(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return '';
  const sec = Math.floor((Date.now() - d.getTime())/1000);
  if (sec < 60) return 'הרגע';
  const min = Math.floor(sec/60);
  if (min < 60) return `לפני ${min} דק׳`;
  const hr = Math.floor(min/60);
  if (hr < 24) return `לפני ${hr} שע׳`;
  const day = Math.floor(hr/24);
  if (day < 7) return `לפני ${day} ימים`;
  return d.toLocaleDateString('he-IL');
}

function normalizePhone(p) {
  if (!p) return '';
  const s = String(p).replace(/[^\d+]/g,'');
  if (s.startsWith('+')) return s.slice(1);
  if (s.startsWith('00')) return s.slice(2);
  if (s.startsWith('0')) return '972' + s.slice(1);
  return s;
}
const telLink = p => p ? `tel:${normalizePhone(p)}` : '#';

/* ============== HEBREW TRANSLITERATION ============== */
// Convert English/Latin name to approximate Hebrew. ~85% accuracy.
function transliterateToHebrew(name) {
  if (!name) return '';
  if (/[\u0590-\u05FF]/.test(name)) return name; // already Hebrew
  if (!/[a-zA-Z]/.test(name)) return name;

  const digraphs = [
    ['sch', 'ש'], ['tch', 'צ׳'], ['kh', 'כ'],
    ['ch', 'צ׳'], ['sh', 'ש'], ['ts', 'צ'], ['tz', 'צ'],
    ['th', 'ת'], ['ph', 'פ'], ['ck', 'ק'],
    ['oo', 'ו'], ['ou', 'ו'], ['ee', 'י'], ['ea', 'י'],
    ['ai', 'יי'], ['ay', 'יי'], ['ei', 'יי'], ['ey', 'יי'],
    ['ie', 'י'], ['oa', 'ו'], ['ow', 'או'],
    // 'ya' / 'yah' → keep ה (use placeholder ֿ◌ that we restore at end)
    ['ya', 'יה\u200B'], ['ye', 'יי'], ['yo', 'יו'], ['yu', 'יו'],
    ['iy', 'י'], ['ae', 'י']
  ];
  const single = {
    a:'ה', b:'ב', c:'ק', d:'ד', e:'', f:'פ', g:'ג', h:'ה',
    i:'י', j:'ג׳', k:'ק', l:'ל', m:'מ', n:'נ', o:'ו', p:'פ',
    q:'ק', r:'ר', s:'ס', t:'ט', u:'ו', v:'ו', w:'ו', x:'קס',
    y:'י', z:'ז'
  };
  const sofit = { 'מ':'ם', 'נ':'ן', 'פ':'ף', 'צ':'ץ', 'כ':'ך' };

  return name.split(/\s+/).map(word => {
    let lower = word.toLowerCase();
    let out = '';
    let i = 0;
    while (i < lower.length) {
      let matched = false;
      for (const [pat, heb] of digraphs) {
        if (lower.substr(i, pat.length) === pat) {
          out += heb; i += pat.length; matched = true; break;
        }
      }
      if (!matched) {
        const ch = lower[i];
        const isFirst = (i === 0);
        // Vowels at start of word: prepend א
        if (isFirst && 'aeiou'.includes(ch)) {
          if (ch === 'a') out += 'א';
          else if (ch === 'e') out += 'א';
          else if (ch === 'i') out += 'אי';
          else if (ch === 'o') out += 'או';
          else if (ch === 'u') out += 'או';
        } else if (ch === 'a') {
          // Middle/end 'a' silent unless single vowel in short word
          out += (lower.length <= 2) ? 'ה' : '';
        } else if (single[ch] !== undefined) {
          out += single[ch];
        } else {
          out += ch;
        }
        i++;
      }
    }
    // Collapse identical consecutive Hebrew chars (skip protected ה)
    out = out.replace(/(.)\1+/g, '$1');
    // Drop trailing 'ה' UNLESS it was protected (followed by zero-width space marker)
    out = out.replace(/ה(?!\u200B)$/, '');
    // Remove the zero-width space markers
    out = out.replace(/\u200B/g, '');
    // Apply sofit
    if (out.length > 0 && sofit[out[out.length-1]]) {
      out = out.slice(0, -1) + sofit[out[out.length-1]];
    }
    return out;
  }).join(' ');
}

/* ============== ROLE → MESSAGE PHRASE ============== */
// Map any role text to the phrase used in the WhatsApp message.
// Keys are substrings to match (case-insensitive). First match wins.
const ROLE_PHRASES = [
  { match: ['מלצר', 'waiter', 'waitress'],   phrase: 'מלצרות' },
  { match: ['בר', 'ברמן', 'barman', 'bar'],   phrase: 'בר' },
  { match: ['מטבח', 'kitchen', 'cook', 'chef'], phrase: 'מטבח' },
  { match: ['מארח', 'מארחת', 'host', 'hostess'], phrase: 'מארחת' }
];

function rolePhrase(role) {
  if (!role) return '';
  const lower = role.toLowerCase();
  for (const r of ROLE_PHRASES) {
    if (r.match.some(m => lower.includes(m.toLowerCase()))) return r.phrase;
  }
  return ''; // unknown role
}

/* ============== WHATSAPP MESSAGE BUILDER ============== */
function buildWhatsAppMessage(lead) {
  // Use first name only
  const fullName = lead.full_name || '';
  const firstName = fullName.split(/\s+/)[0] || '';
  const name = transliterateToHebrew(firstName) || firstName;
  const phrase = rolePhrase(lead.role);
  const roleClause = phrase ? `בנוגע למשרת ${phrase} ` : '';
  return `היי ${name} מה שלומך? ראיתי שהשארת פרטים ${roleClause}באומינו סושי.`;
}

function waLinkWithMessage(lead) {
  if (!lead.phone) return '#';
  const phone = normalizePhone(lead.phone);
  const msg = encodeURIComponent(buildWhatsAppMessage(lead));
  return `https://wa.me/${phone}?text=${msg}`;
}

/* ============== SHEETS LOAD (hardcoded column positions) ============== */
// Column letters for the Umino sheet (Facebook Lead Ads layout)
// M=12, N=13, O=14, P=15, Q=16, S=18, T=19, U=20  (0-based indices)
const COL = {
  role:        12, // M - לאיזה תפקיד
  full_name:   13, // N
  phone:       14, // O
  gender:      15, // P
  city:        16, // Q
  // R = 17 (skipped/empty)
  lead_status: 18, // S - we IGNORE this, status comes from Supabase
  lead_key:    19, // T - added by Apps Script
  created_time:20  // U - added by Apps Script
};

async function loadSheets() {
  const url = `https://docs.google.com/spreadsheets/d/${CFG.sheetId}/gviz/tq?tqx=out:json&headers=0&t=${Date.now()}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Sheets fetch failed: ${res.status}`);
  const text = await res.text();
  const m = text.match(/google\.visualization\.Query\.setResponse\(([\s\S]*)\)/);
  if (!m) throw new Error('Could not parse gviz response');
  const json = JSON.parse(m[1]);

  const rows = json.table.rows || [];

  const cellText = (row, j) => {
    const c = row && row.c && row.c[j];
    return (c && c.v != null) ? String(c.v).trim() : '';
  };

  // Tokens that mark a HEADER row (row to skip)
  const headerTokens = ['full_name','phone_number','gender','city','lead_status'];

  window.__umino_debug = {
    totalRows: rows.length,
    sampleFirstRow: rows[0] ? (rows[0].c || []).map((_, j) => cellText(rows[0], j)) : null,
    sampleSecondRow: rows[1] ? (rows[1].c || []).map((_, j) => cellText(rows[1], j)) : null
  };

  const out = [];
  for (let i = 0; i < rows.length; i++) {
    const row = rows[i];

    // Detect & skip header rows: row that contains 2+ known header tokens
    const allCells = (row.c || []).map((_, j) => cellText(row, j));
    const headerHits = allCells.filter(v => headerTokens.includes(v)).length;
    if (headerHits >= 2) continue;

    const lead_key = cellText(row, COL.lead_key);
    if (!lead_key) continue;

    out.push({
      lead_key,
      created_time: cellText(row, COL.created_time),
      full_name:    cellText(row, COL.full_name),
      phone:        cellText(row, COL.phone),
      role:         cellText(row, COL.role),
      gender:       cellText(row, COL.gender),
      city:         cellText(row, COL.city)
    });
  }

  window.__umino_debug.leadsFound = out.length;
  window.__umino_debug.firstLead = out[0] || null;
  return out;
}

/* ============== SUPABASE ============== */
function sbHeaders() {
  return {
    'apikey': CFG.supabase.anonKey,
    'Authorization': `Bearer ${CFG.supabase.anonKey}`,
    'Content-Type': 'application/json'
  };
}

async function loadStatuses() {
  const url = `${CFG.supabase.url}/rest/v1/${CFG.supabase.table}?select=*`;
  const res = await fetch(url, { headers: sbHeaders() });
  if (!res.ok) throw new Error(`Supabase load failed: ${res.status}`);
  const rows = await res.json();
  const map = {};
  rows.forEach(r => map[r.lead_key] = r);
  return map;
}

/**
 * SAFE UPSERT: fetches existing row first, merges, then sends FULL object.
 * This avoids the partial-object reset bug seen in Paseo.
 */
async function saveStatus(lead_key, patch, statusEl) {
  setSaving(statusEl, '…שומר');
  try {
    // 1. Fetch existing
    const getUrl = `${CFG.supabase.url}/rest/v1/${CFG.supabase.table}?lead_key=eq.${encodeURIComponent(lead_key)}&select=*`;
    const getRes = await fetch(getUrl, { headers: sbHeaders() });
    if (!getRes.ok) throw new Error(`fetch existing: ${getRes.status}`);
    const existing = (await getRes.json())[0] || { lead_key };

    // 2. Merge
    const merged = { ...existing, ...patch, lead_key, updated_at: new Date().toISOString() };
    delete merged.created_at; // let DB keep its own

    // 3. Upsert with FULL merged object
    const url = `${CFG.supabase.url}/rest/v1/${CFG.supabase.table}?on_conflict=lead_key`;
    const res = await fetch(url, {
      method: 'POST',
      headers: { ...sbHeaders(), 'Prefer': 'resolution=merge-duplicates,return=representation' },
      body: JSON.stringify(merged)
    });
    if (!res.ok) {
      const txt = await res.text();
      throw new Error(`save: ${res.status} ${txt}`);
    }
    const saved = (await res.json())[0];
    STATUSES[lead_key] = saved;
    setSaving(statusEl, 'נשמר ✓', 'ok');
    setTimeout(() => setSaving(statusEl, ''), 1500);
    render();
  } catch (e) {
    console.error(e);
    setSaving(statusEl, 'שגיאה', 'bad');
  }
}

function setSaving(el, txt, cls='') {
  if (!el) return;
  el.textContent = txt;
  el.className = 'saving ' + cls;
}

/* ============== RENDER ============== */
function bucket(lead) {
  const s = STATUSES[lead.lead_key];
  if (!s) return 'new';
  if (s.hidden) return 'hidden';
  if (!s.status) return 'new';
  const def = CFG.statuses.find(x => x.v === s.status);
  return def ? def.bucket : 'new';
}

function render() {
  // Role filter dropdown population
  const roles = [...new Set(LEADS.map(l => l.role).filter(Boolean))].sort();
  const sel = $('#roleFilter');
  const cur = sel.value;
  sel.innerHTML = `<option value="">כל התפקידים</option>` +
    roles.map(r => `<option value="${r}">${r}</option>`).join('');
  sel.value = cur || ROLE_FILTER || '';

  // Filter
  const filtered = LEADS.filter(l => !ROLE_FILTER || l.role === ROLE_FILTER);

  // Bucket
  const buckets = { new:[], scheduled:[], in_progress:[], not_relevant:[], hidden:[] };
  filtered.forEach(l => {
    const b = bucket(l);
    if (buckets[b]) buckets[b].push(l);
    else buckets.new.push(l);
  });

  // Sort each bucket by created_time desc
  Object.keys(buckets).forEach(k => {
    buckets[k].sort((a,b) => (b.created_time||'').localeCompare(a.created_time||''));
  });

  $('#stat').textContent =
    `סה״כ ${filtered.length} • חדשים ${buckets.new.length} • ראיון ${buckets.scheduled.length} • בתהליך ${buckets.in_progress.length}`;

  const sections = [
    { key:'new',          title:'חדשים',         color:'var(--new)' },
    { key:'scheduled',    title:'נקבע ראיון',    color:'var(--sched)' },
    { key:'in_progress',  title:'בתהליך',        color:'var(--prog)' },
    { key:'not_relevant', title:'לא רלוונטי',    color:'var(--bad)' },
    { key:'hidden',       title:'מוסתרים',       color:'var(--hide)' }
  ];

  $('#app').innerHTML = sections.map(sec => `
    <section class="section">
      <div class="sec-head">
        <span class="dot" style="background:${sec.color}"></span>
        ${sec.title}
        <span class="count">${buckets[sec.key].length}</span>
      </div>
      ${buckets[sec.key].length === 0
        ? `<div class="empty">אין לידים</div>`
        : `<div class="grid">${buckets[sec.key].map(cardHTML).join('')}</div>`}
    </section>
  `).join('');

  // Wire up controls
  filtered.forEach(l => wireCard(l));
}

function cardHTML(lead) {
  const s = STATUSES[lead.lead_key] || {};
  const currentStatus = s.status || 'new';
  const statusOpts = CFG.statuses
    .map(x => `<option value="${x.v}" ${currentStatus===x.v?'selected':''}>${x.label}</option>`).join('');
  const handlerOpts = ['<option value="">— מטפל —</option>']
    .concat(CFG.handlers.map(h => `<option value="${h}" ${s.handled_by===h?'selected':''}>${h}</option>`)).join('');

  const roleBadge = lead.role ? `<span class="pill role">${escapeHtml(lead.role)}</span>` : '';
  const cityBadge = lead.city ? `<span class="pill">${escapeHtml(lead.city)}</span>` : '';
  const genderBadge = lead.gender ? `<span class="pill">${escapeHtml(lead.gender)}</span>` : '';

  // Show interview date/time fields only for scheduled-bucket statuses
  const def = CFG.statuses.find(x => x.v === currentStatus);
  const showInterview = def && def.bucket === 'scheduled';
  const interviewBlock = showInterview ? `
    <div class="interview-row">
      <input type="date" data-k="interview_date" value="${s.interview_date||''}">
      <input type="time" data-k="interview_time" value="${s.interview_time||''}">
    </div>` : '';

  return `
    <div class="card" data-key="${lead.lead_key}">
      <div class="name">${escapeHtml(lead.full_name) || '—'}</div>
      <div class="row">
        <span class="pill time">${relativeHe(lead.created_time)}</span>
        ${roleBadge}${cityBadge}${genderBadge}
      </div>
      <div class="actions">
        <a class="wa" href="${waLinkWithMessage(lead)}" target="_blank">WhatsApp</a>
        <a class="call" href="${telLink(lead.phone)}">חיוג</a>
        <button class="hide" data-act="hide">${s.hidden?'בטל הסתרה':'הסתר'}</button>
      </div>
      <div class="controls">
        <select data-k="handled_by">${handlerOpts}</select>
        <select data-k="status">${statusOpts}</select>
        <span class="saving" data-saving></span>
      </div>
      ${interviewBlock}
    </div>`;
}

function escapeHtml(s) {
  return String(s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function wireCard(lead) {
  const card = document.querySelector(`.card[data-key="${CSS.escape(lead.lead_key)}"]`);
  if (!card) return;
  const sav = card.querySelector('[data-saving]');

  card.querySelectorAll('select[data-k]').forEach(sel => {
    sel.addEventListener('change', () => {
      const patch = { [sel.dataset.k]: sel.value || null };
      saveStatus(lead.lead_key, patch, sav);
    });
  });

  card.querySelectorAll('input[data-k]').forEach(inp => {
    inp.addEventListener('change', () => {
      saveStatus(lead.lead_key, { [inp.dataset.k]: inp.value || null }, sav);
    });
  });

  const hideBtn = card.querySelector('button.hide');
  if (hideBtn) {
    hideBtn.addEventListener('click', () => {
      const cur = STATUSES[lead.lead_key]?.hidden;
      saveStatus(lead.lead_key, { hidden: !cur }, sav);
    });
  }
}

/* ============== BOOT ============== */
async function boot() {
  clearErr();
  try {
    const [leads, statuses] = await Promise.all([loadSheets(), loadStatuses()]);
    LEADS = leads;
    STATUSES = statuses;
    render();
  } catch (e) {
    console.error(e);
    showErr(e.message + ' — בדוק שהשיטס public, שה-Apps Script רץ, ושה-Anon Key נכון.');
    $('#app').innerHTML = '';
  }
}

$('#refreshBtn').addEventListener('click', boot);
$('#roleFilter').addEventListener('change', e => {
  ROLE_FILTER = e.target.value;
  render();
});

boot();
// Auto-refresh every 60s
setInterval(boot, 60000);
</script>
